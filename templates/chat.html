<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- MAIN CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body data-username="{{ username }}">

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="sidebar-header">
            <h2>WhatsApp</h2>
        </div>

        <div class="profile">
            <div class="avatar">{{ username[0]|upper }}</div>
            <div class="profile-info">
                <div class="profile-name">{{ username }}</div>
                <div class="profile-status">Online</div>
            </div>
        </div>

        <div class="search-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search user">
            </div>
        </div>

        <div class="contacts-list" id="contactsList"></div>

    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">

        <div class="chat-header">
            <div class="avatar" id="chatAvatar">👤</div>
            <div class="chat-contact-info">
                <div class="chat-contact-name" id="chatName">Select user</div>
                <div class="chat-contact-status" id="chatStatus">Offline</div>
            </div>
        </div>

        <div class="messages-container" id="messages"></div>

        <div class="typing-indicator" id="typingIndicator"></div>

        <div class="input-area">
            <input id="messageInput" placeholder="Type message">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

    </div>

</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>

<script>
let socket = io({
    transports: ["websocket"],
    upgrade: false
});

let username = document.body.dataset.username;
let currentUser = null;

// ================= CONNECT =================
socket.on("connect", () => console.log("✅ Connected"));

// ================= RECEIVE =================
socket.on("receive_message", data => {
    if (currentUser === data.from) {
        addMessage(data.from, data.msg, false);
    }
});

// ================= TYPING =================
socket.on("typing", data => {
    document.getElementById("typingIndicator").innerText =
        data.from + " typing...";
    setTimeout(()=>document.getElementById("typingIndicator").innerText="",1000);
});

// ================= FUNCTIONS =================
function selectUser(user){
    currentUser = user;
    document.getElementById("chatArea").style.display = "flex";
    document.getElementById("chatName").innerText = user;
}

function sendMessage(){
    let msg = document.getElementById("messageInput").value;
    if(!msg || !currentUser) return;

    addMessage(username, msg, true);

    socket.emit("send_message", {
        msg: msg,
        to: currentUser
    });

    document.getElementById("messageInput").value="";
}

function addMessage(sender, text, sent){
    let box = document.getElementById("messages");

    let div = document.createElement("div");
    div.className = "message " + (sent ? "sent" : "received");

    div.innerHTML = `
        <div class="bubble">
            <div class="msg-text">${text}</div>
        </div>
    `;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// typing
document.getElementById("messageInput").addEventListener("input", ()=>{
    if(currentUser){
        socket.emit("typing",{to:currentUser});
    }
});
</script>

</body>
</html>
