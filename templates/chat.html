<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f0f2f5;}
        
        /* Main Container */
        .whatsapp-container{display:flex;height:100vh;max-width:1400px;margin:0 auto;background:#fff;box-shadow:0 0 20px rgba(0,0,0,0.1);}
        
        /* Sidebar */
        .sidebar{width:380px;background:#f8f9fa;border-right:1px solid #e9ecef;display:flex;flex-direction:column;}
        .sidebar-header{background:#075E54;color:white;padding:20px;display:flex;justify-content:space-between;align-items:center;}
        .sidebar-header h2{font-size:18px;font-weight:600;}
        .header-icons{display:flex;gap:20px;}
        .header-icons i{font-size:20px;cursor:pointer;}
        
        /* Profile Section */
        .profile-section{background:#fff;padding:15px 20px;display:flex;align-items:center;gap:15px;border-bottom:1px solid #e9ecef;}
        .profile-avatar{width:50px;height:50px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:white;}
        .profile-info{flex:1;}
        .profile-name{font-weight:700;font-size:16px;}
        .profile-bio{font-size:12px;color:#6c757d;}
        .profile-actions{display:flex;gap:15px;}
        .profile-actions i{font-size:20px;color:#6c757d;cursor:pointer;}
        
        /* Search Bar */
        .search-bar{padding:12px 16px;background:#fff;}
        .search-box{background:#f0f2f5;border-radius:30px;padding:8px 16px;display:flex;align-items:center;gap:10px;}
        .search-box i{color:#6c757d;}
        .search-box input{flex:1;border:none;background:transparent;outline:none;font-size:14px;}
        
        /* Chats/Tabs */
        .tabs{display:flex;background:#fff;border-bottom:1px solid #e9ecef;}
        .tab{flex:1;text-align:center;padding:12px;cursor:pointer;color:#6c757d;font-weight:500;}
        .tab.active{color:#075E54;border-bottom:2px solid #075E54;}
        
        /* Contacts/Status List */
        .contacts-list{flex:1;overflow-y:auto;}
        .contact-item,.status-item{display:flex;align-items:center;gap:15px;padding:12px 16px;cursor:pointer;transition:background 0.2s;border-bottom:1px solid #f0f2f5;}
        .contact-item:hover,.status-item:hover{background:#f5f6f8;}
        .contact-item.active{background:#e8f0fe;}
        .contact-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;}
        .contact-avatar.status-ring{border:2px solid #25D366;padding:2px;}
        .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#25D366;border-radius:50%;border:2px solid white;}
        .contact-info{flex:1;}
        .contact-name{font-weight:600;font-size:15px;}
        .contact-last-msg{font-size:12px;color:#6c757d;}
        .contact-time{font-size:10px;color:#6c757d;}
        
        /* Chat Area */
        .chat-area{flex:1;display:flex;flex-direction:column;background:#efeae2;}
        .chat-header{background:#075E54;color:white;padding:15px 20px;display:flex;align-items:center;gap:15px;}
        .chat-contact-avatar{width:45px;height:45px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;}
        .chat-contact-info{flex:1;}
        .chat-contact-name{font-weight:600;}
        .chat-contact-status{font-size:12px;opacity:0.8;}
        .chat-actions{display:flex;gap:20px;}
        .chat-actions i{font-size:20px;cursor:pointer;}
        
        /* Messages */
        .messages-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px;}
        .message{display:flex;max-width:65%;animation:fadeIn 0.2s;}
        .message.sent{align-self:flex-end;}
        .message.received{align-self:flex-start;}
        .bubble{padding:10px 14px;border-radius:18px;position:relative;word-wrap:break-word;}
        .sent .bubble{background:#dcf8c5;border-bottom-right-radius:4px;}
        .received .bubble{background:white;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,0.1);}
        .msg-text{font-size:14px;}
        .msg-time{font-size:10px;color:#8e9aaf;margin-top:4px;display:flex;align-items:center;justify-content:flex-end;gap:4px;}
        .sent .msg-time i{color:#34b7f1;font-size:12px;}
        .message-name{font-size:11px;font-weight:600;color:#075E54;margin-bottom:4px;}
        
        /* Typing Indicator */
        .typing-indicator{padding:8px 20px;font-size:12px;color:#6c757d;display:flex;align-items:center;gap:8px;}
        .typing-dots span{width:6px;height:6px;background:#6c757d;border-radius:50%;display:inline-block;animation:typing 1.4s infinite;}
        .typing-dots span:nth-child(2){animation-delay:0.2s;}
        .typing-dots span:nth-child(3){animation-delay:0.4s;}
        @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-4px);opacity:1;}}
        
        /* Input Area */
        .input-area{padding:15px 20px;background:#f0f2f5;display:flex;gap:12px;align-items:center;}
        .input-area input{flex:1;padding:12px 18px;border:none;border-radius:30px;font-size:14px;outline:none;}
        .input-area button{width:45px;height:45px;border:none;border-radius:50%;cursor:pointer;font-size:18px;transition:transform 0.2s;}
        .emoji-btn{background:#fff;color:#6c757d;}
        .send-btn{background:#075E54;color:white;}
        .input-area button:hover{transform:scale(1.05);}
        
        /* Status Modal */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;}
        .modal-content{background:white;border-radius:20px;padding:30px;max-width:400px;width:90%;}
        .status-view{position:relative;background:#000;border-radius:20px;padding:20px;min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .status-view img,.status-view video{max-width:100%;max-height:500px;}
        .status-text{color:white;font-size:24px;text-align:center;}
        
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        ::-webkit-scrollbar{width:6px;}
        ::-webkit-scrollbar-track{background:#f1f1f1;}
        ::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:4px;}
        
        @media(max-width:768px){.sidebar{width:100px;}.sidebar .contact-info,.sidebar .profile-info{display:none;}}
    </style>
</head>
<body>
<div class="whatsapp-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>WhatsApp</h2>
            <div class="header-icons">
                <i class="fas fa-camera"></i>
                <i class="fas fa-search" onclick="openSearchModal()"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        
        <div class="profile-section">
            <div class="profile-avatar" id="profileAvatar">{{ username[0]|upper }}</div>
            <div class="profile-info">
                <div class="profile-name" id="profileName">{{ username }}</div>
                <div class="profile-bio" id="profileBio">Available</div>
            </div>
            <div class="profile-actions">
                <i class="fas fa-edit" onclick="openProfileModal()"></i>
                <i class="fas fa-sign-out-alt" onclick="logout()" style="color:#dc3545;"></i>
            </div>
        </div>
        
        <div class="search-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search or start new chat" onkeyup="searchUsers()">
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chats')">Chats</div>
            <div class="tab" onclick="switchTab('status')">Status</div>
            <div class="tab" onclick="switchTab('calls')">Calls</div>
        </div>
        
        <div class="contacts-list" id="contactsList">
            <!-- Contacts will load here -->
            <div style="text-align:center;padding:40px;color:#999;">Loading chats...</div>
        </div>
    </div>
    
    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="chat-header">
            <div class="chat-contact-avatar" id="chatAvatar">🤖</div>
            <div class="chat-contact-info">
                <div class="chat-contact-name" id="chatContactName">Select a chat</div>
                <div class="chat-contact-status" id="chatContactStatus">Click to start messaging</div>
            </div>
            <div class="chat-actions">
                <i class="fas fa-video"></i>
                <i class="fas fa-phone"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        
        <div class="messages-container" id="messages">
            <div style="text-align:center;padding:50px;color:#999;">
                <i class="fas fa-comments" style="font-size:50px;margin-bottom:15px;display:block;"></i>
                <p>Select a contact to start chatting</p>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator"></div>
        
        <div class="input-area">
            <button class="emoji-btn" onclick="addEmoji()"><i class="far fa-smile-wink"></i></button>
            <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <h3>Edit Profile</h3>
        <input type="text" id="editFullName" placeholder="Full Name" style="width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ddd;">
        <input type="text" id="editBio" placeholder="Bio" style="width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ddd;">
        <select id="editProfilePic" style="width:100%;padding:10px;margin:10px 0;border-radius:10px;">
            <option value="😀">😀 Smiley</option>
            <option value="😎">😎 Cool</option>
            <option value="❤️">❤️ Heart</option>
            <option value="🔥">🔥 Fire</option>
            <option value="🌟">🌟 Star</option>
        </select>
        <button onclick="updateProfile()" class="btn-primary" style="width:100%;padding:12px;">Save</button>
        <button onclick="closeProfileModal()" style="width:100%;padding:12px;margin-top:10px;">Cancel</button>
    </div>
</div>

<!-- Search Results Modal -->
<div id="searchModal" class="modal">
    <div class="modal-content">
        <h3>Search Users</h3>
        <input type="text" id="globalSearch" placeholder="Search by username..." style="width:100%;padding:10px;margin:10px 0;border-radius:10px;" onkeyup="globalSearch()">
        <div id="searchResults"></div>
        <button onclick="closeSearchModal()" style="width:100%;padding:12px;margin-top:10px;">Close</button>
    </div>
</div>

<!-- Post Status Modal -->
<div id="statusModal" class="modal">
    <div class="modal-content">
        <h3>Add Status</h3>
        <input type="text" id="statusContent" placeholder="What's on your mind?" style="width:100%;padding:10px;margin:10px 0;border-radius:10px;">
        <button onclick="postStatus()" class="btn-primary" style="width:100%;padding:12px;">Post Status</button>
        <button onclick="closeStatusModal()" style="width:100%;padding:12px;margin-top:10px;">Cancel</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script>
var username = "{{ username }}";
var currentReceiver = null;
var socket = io();
var typingTimeout = null;

// Socket Events
socket.on('connect', function() { console.log('Connected'); loadContacts(); });
socket.on('receive_message', function(data) {
    if (currentReceiver === data.from) {
        displayMessage(data.from, data.message, data.timestamp, false);
        scrollToBottom();
    } else {
        showNotification(data.from);
    }
    loadContacts();
});
socket.on('user_typing', function(data) {
    if (currentReceiver === data.from) {
        document.getElementById('typingIndicator').innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div> ' + data.from + ' is typing...';
    }
});
socket.on('user_stop_typing', function() { document.getElementById('typingIndicator').innerHTML = ''; });
socket.on('message_history', function(messages) {
    document.getElementById('messages').innerHTML = '';
    messages.forEach(function(msg) { displayMessage(msg.sender, msg.message, msg.timestamp, msg.sender === username); });
    scrollToBottom();
});

// Load Contacts
function loadContacts() {
    fetch('/api/get_contacts').then(r => r.json()).then(contacts => {
        var html = '';
        contacts.forEach(c => {
            html += `<div class="contact-item" onclick="selectUser('${c.username}')">
                        <div class="contact-avatar">${c.profile_pic || c.username[0].toUpperCase()}
                            ${c.is_online ? '<div class="online-dot"></div>' : ''}
                        </div>
                        <div class="contact-info">
                            <div class="contact-name">${c.full_name || c.username}</div>
                            <div class="contact-last-msg">${c.is_online ? 'Online' : 'Last seen ' + c.last_seen}</div>
                        </div>
                    </div>`;
        });
        document.getElementById('contactsList').innerHTML = html || '<div style="text-align:center;padding:40px;">No chats yet. Search for users to start chatting!</div>';
    });
}

// Search Users
function searchUsers() {
    var query = document.getElementById('searchInput').value;
    if (query.length < 1) { loadContacts(); return; }
    fetch('/api/search_users?q=' + query).then(r => r.json()).then(users => {
        var html = '';
        users.forEach(u => {
            html += `<div class="contact-item" onclick="selectUser('${u.username}')">
                        <div class="contact-avatar">${u.profile_pic || u.username[0].toUpperCase()}
                            ${u.is_online ? '<div class="online-dot"></div>' : ''}
                        </div>
                        <div class="contact-info">
                            <div class="contact-name">${u.full_name || u.username}</div>
                            <div class="contact-last-msg">@${u.username}</div>
                        </div>
                    </div>`;
        });
        document.getElementById('contactsList').innerHTML = html || '<div style="text-align:center;padding:40px;">No users found</div>';
    });
}

function globalSearch() {
    var query = document.getElementById('globalSearch').value;
    if (query.length < 1) { document.getElementById('searchResults').innerHTML = ''; return; }
    fetch('/api/search_users?q=' + query).then(r => r.json()).then(users => {
        var html = '';
        users.forEach(u => {
            html += `<div class="contact-item" onclick="selectUser('${u.username}');closeSearchModal();">
                        <div class="contact-avatar">${u.profile_pic || u.username[0].toUpperCase()}</div>
                        <div class="contact-info"><div class="contact-name">${u.full_name || u.username}</div><div class="contact-last-msg">@${u.username}</div></div>
                    </div>`;
        });
        document.getElementById('searchResults').innerHTML = html || '<p style="text-align:center;padding:20px;">No users found</p>';
    });
}

function selectUser(user) {
    currentReceiver = user;
    document.getElementById('chatContactName').innerText = user;
    document.getElementById('chatContactStatus').innerText = 'Online';
    document.getElementById('chatArea').style.display = 'flex';
    document.querySelectorAll('.contact-item').forEach(i => i.classList.remove('active'));
    socket.emit('get_history', { with: user });
    document.getElementById('messageInput').focus();
}

function sendMessage() {
    var msg = document.getElementById('messageInput').value.trim();
    if (!msg || !currentReceiver) return;
    var time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    socket.emit('private_message', { to: currentReceiver, message: msg });
    displayMessage(username, msg, time, true);
    document.getElementById('messageInput').value = '';
    scrollToBottom();
    clearTimeout(typingTimeout);
    socket.emit('typing_stop', { to: currentReceiver });
}

function displayMessage(sender, text, time, isSent) {
    var container = document.getElementById('messages');
    var empty = container.querySelector('div[style*="text-align:center"]');
    if (empty) empty.remove();
    var div = document.createElement('div');
    div.className = 'message ' + (isSent ? 'sent' : 'received');
    div.innerHTML = `<div class="bubble">${!isSent ? '<div class="message-name">' + escapeHtml(sender) + '</div>' : ''}<div class="msg-text">${escapeHtml(text)}</div><div class="msg-time">${time} ${isSent ? '<i class="fas fa-check-double"></i>' : ''}</div></div>`;
    container.appendChild(div);
}

function addEmoji() {
    var emojis = ['😀','😂','😍','🔥','👍','🎉','❤️','😎','✨','💯','🥰','🤣','😭','🙌','💪','👋','🙏','💀','🤡','👻'];
    document.getElementById('messageInput').value += emojis[Math.floor(Math.random() * emojis.length)];
    document.getElementById('messageInput').focus();
}

function scrollToBottom() { var m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (tab === 'chats') { document.querySelector('.tab:first-child').classList.add('active'); loadContacts(); }
    else if (tab === 'status') { document.querySelector('.tab:nth-child(2)').classList.add('active'); loadStatuses(); }
}

function loadStatuses() {
    fetch('/api/get_statuses').then(r => r.json()).then(statuses => {
        var html = '<div style="padding:10px;" onclick="openStatusModal()"><div class="status-item"><div class="contact-avatar status-ring">📷</div><div class="contact-info"><div class="contact-name">My Status</div><div class="contact-last-msg">Tap to add status update</div></div></div></div>';
        statuses.forEach(s => {
            html += `<div class="status-item" onclick="viewStatus(${s.id})"><div class="contact-avatar status-ring">${s.content_type === 'text' ? '📝' : '📷'}</div><div class="contact-info"><div class="contact-name">${s.username}</div><div class="contact-last-msg">${s.content.substring(0,30)}</div></div><div class="contact-time">${s.time_ago}</div></div>`;
        });
        document.getElementById('contactsList').innerHTML = html || '<div style="text-align:center;padding:40px;">No status updates</div>';
    });
}

function postStatus() {
    var content = document.getElementById('statusContent').value;
    if (!content) return;
    fetch('/api/post_status', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: content, content_type: 'text' }) })
        .then(() => { closeStatusModal(); loadStatuses(); });
}

function updateProfile() {
    var data = { full_name: document.getElementById('editFullName').value, bio: document.getElementById('editBio').value, profile_pic: document.getElementById('editProfilePic').value };
    fetch('/api/update_profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
        .then(() => { closeProfileModal(); location.reload(); });
}

function logout() { window.location.href = '/logout'; }
function openProfileModal() { document.getElementById('profileModal').style.display = 'flex'; }
function closeProfileModal() { document.getElementById('profileModal').style.display = 'none'; }
function openSearchModal() { document.getElementById('searchModal').style.display = 'flex'; }
function closeSearchModal() { document.getElementById('searchModal').style.display = 'none'; }
function openStatusModal() { document.getElementById('statusModal').style.display = 'flex'; }
function closeStatusModal() { document.getElementById('statusModal').style.display = 'none'; }

document.getElementById('messageInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
document.getElementById('messageInput').addEventListener('input', function() { if (!currentReceiver) return; socket.emit('typing', { to: currentReceiver }); clearTimeout(typingTimeout); typingTimeout = setTimeout(function() { socket.emit('typing_stop', { to: currentReceiver }); }, 1000); });

loadContacts();
setInterval(loadContacts, 5000);
</script>
</body>
</html>
