<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ChatApp · Modern Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div>
                    <i class="fab fa-whatsapp"></i>
                    <span>Chats</span>
                </div>
                <div class="user-menu">
                    <a href="/logout" class="logout-btn" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </a>
                </div>
            </div>
            
            <div class="user-profile">
                <div class="avatar">{{ username[0]|upper }}</div>
                <div class="user-details">
                    <div class="name">{{ username }}</div>
                    <div class="status">
                        <span class="online-dot"></span> 
                        <span id="statusText">Online</span>
                    </div>
                </div>
            </div>
            
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchUsers" placeholder="Search contacts...">
            </div>
            
            <div class="users-list" id="usersList">
                {% for user in users %}
                <div class="user-item" data-user="{{ user.username }}">
                    <div class="avatar small">{{ user.username[0]|upper }}</div>
                    <div class="user-info">
                        <div class="name">{{ user.username }}</div>
                        <div class="last-msg">Click to chat</div>
                    </div>
                    <div class="notification-badge" style="display: none;"></div>
                </div>
                {% endfor %}
            </div>
        </div>
        
        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                <div class="selected-user">
                    <i class="fas fa-comment-dots"></i>
                    <span id="selectedUserName">Select a conversation</span>
                </div>
            </div>
            
            <div class="messages-container" id="messages">
                <div class="empty-chat">
                    <i class="fas fa-comment-alt"></i>
                    <p>✨ Select a contact<br>to start messaging</p>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator"></div>
            
            <div class="message-input">
                <button onclick="addEmoji()" class="emoji-btn" title="Add emoji">
                    <i class="far fa-smile-wink"></i>
                </button>
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                <button onclick="sendMessage()" class="send-btn" title="Send message">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script>
        var username = "{{ username }}";
        var currentReceiver = null;
        var socket = io();
        var typingTimeout = null;
        
        // Socket events
        socket.on('connect', function() {
            console.log('✅ Connected to server as:', username);
        });
        
        socket.on('users_list', function(users) {
            updateUsersList(users);
        });
        
        socket.on('receive_message', function(data) {
            if (currentReceiver === data.from) {
                displayMessage(data.from, data.message, data.timestamp, false);
                scrollToBottom();
            } else {
                showNotificationBadge(data.from);
            }
            playNotificationSound();
        });
        
        socket.on('user_typing', function(data) {
            if (currentReceiver === data.from) {
                showTypingIndicator(data.from);
            }
        });
        
        socket.on('user_stop_typing', function(data) {
            if (currentReceiver === data.from) {
                hideTypingIndicator();
            }
        });
        
        socket.on('user_joined', function(data) {
            addSystemMessage('✨ ' + data.username + ' joined the chat');
            loadUsers();
        });
        
        socket.on('user_left', function(username) {
            addSystemMessage('👋 ' + username + ' left the chat');
            loadUsers();
        });
        
        // Select user to chat
        function selectUser(userId, userName) {
            currentReceiver = userId;
            document.getElementById('selectedUserName').innerText = userName;
            
            // Clear messages
            var messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            // Highlight active user
            document.querySelectorAll('.user-item').forEach(function(item) {
                item.classList.remove('active');
                if (item.getAttribute('data-user') === userId) {
                    item.classList.add('active');
                    var badge = item.querySelector('.notification-badge');
                    if (badge) badge.style.display = 'none';
                }
            });
            
            // Load chat history
            loadChatHistory(userId);
            
            // Focus on input
            document.getElementById('messageInput').focus();
        }
        
        // Load chat history from server
        function loadChatHistory(userId) {
            socket.emit('get_history', { with: userId });
        }
        
        socket.on('message_history', function(messages) {
            messages.forEach(function(msg) {
                displayMessage(msg.sender, msg.message, msg.time, msg.sender === username);
            });
            scrollToBottom();
        });
        
        // Send message
        function sendMessage() {
            var input = document.getElementById('messageInput');
            var message = input.value.trim();
            
            if (!message) return;
            if (!currentReceiver) {
                alert('Please select a user to chat with');
                return;
            }
            
            var time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            socket.emit('private_message', {
                to: currentReceiver,
                message: message,
                timestamp: time
            });
            
            displayMessage(username, message, time, true);
            input.value = '';
            scrollToBottom();
            
            // Stop typing indicator
            if (typingTimeout) clearTimeout(typingTimeout);
            socket.emit('typing_stop', { to: currentReceiver });
        }
        
        // Display message
        function displayMessage(sender, text, time, isSent) {
            var messagesDiv = document.getElementById('messages');
            
            // Remove empty state if present
            var emptyState = messagesDiv.querySelector('.empty-chat');
            if (emptyState) emptyState.remove();
            
            var messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (isSent ? 'sent' : 'received');
            
            messageDiv.innerHTML = `
                <div class="bubble">
                    ${!isSent ? '<div class="message-name">' + escapeHtml(sender) + '</div>' : ''}
                    <div class="msg-text">${escapeHtml(text)}</div>
                    <div class="msg-time">
                        ${time}
                        ${isSent ? '<i class="fas fa-check"></i>' : ''}
                    </div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
        }
        
        // Update users list
        function updateUsersList(users) {
            var container = document.getElementById('usersList');
            if (!container) return;
            
            container.innerHTML = '';
            
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state">No other users online</div>';
                return;
            }
            
            users.forEach(function(user) {
                var userDiv = document.createElement('div');
                userDiv.className = 'user-item';
                userDiv.setAttribute('data-user', user.id);
                
                userDiv.innerHTML = `
                    <div class="avatar small">${user.id.charAt(0).toUpperCase()}</div>
                    <div class="user-info">
                        <div class="name">${escapeHtml(user.id)}</div>
                        <div class="last-msg">Click to chat</div>
                    </div>
                    <div class="notification-badge" style="display: none;"></div>
                `;
                
                userDiv.onclick = (function(u) {
                    return function() { selectUser(u.id, u.id); };
                })(user);
                
                container.appendChild(userDiv);
            });
        }
        
        // Load users
        function loadUsers() {
            socket.emit('get_users');
        }
        
        // Show typing indicator
        function showTypingIndicator(user) {
            var typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) {
                typingDiv.innerHTML = `
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <span>${escapeHtml(user)} is typing...</span>
                `;
            }
        }
        
        // Hide typing indicator
        function hideTypingIndicator() {
            var typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) {
                typingDiv.innerHTML = '';
            }
        }
        
        // Add system message
        function addSystemMessage(message) {
            var messagesDiv = document.getElementById('messages');
            var emptyState = messagesDiv.querySelector('.empty-chat');
            if (emptyState) emptyState.remove();
            
            var systemDiv = document.createElement('div');
            systemDiv.className = 'system-message';
            systemDiv.innerHTML = `<span>${escapeHtml(message)}</span>`;
            messagesDiv.appendChild(systemDiv);
            scrollToBottom();
        }
        
        // Show notification badge
        function showNotificationBadge(userId) {
            var userItems = document.querySelectorAll('.user-item');
            userItems.forEach(function(item) {
                if (item.getAttribute('data-user') === userId && !item.classList.contains('active')) {
                    var badge = item.querySelector('.notification-badge');
                    if (badge) badge.style.display = 'block';
                }
            });
        }
        
        // Play notification sound
        function playNotificationSound() {
            // Optional: Add sound notification
            try {
                var audio = new Audio('/static/notification.mp3');
                audio.play().catch(function(e) {});
            } catch(e) {}
        }
        
        // Add emoji
        function addEmoji() {
            var emojis = ['😀', '😂', '😍', '🔥', '👍', '🎉', '❤️', '😎', '✨', '💯', '🥰', '🤣', '😭', '🙌', '💪'];
            var emoji = emojis[Math.floor(Math.random() * emojis.length)];
            var input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
        }
        
        // Scroll to bottom
        function scrollToBottom() {
            var messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('messageInput').addEventListener('input', function() {
            if (!currentReceiver) return;
            
            socket.emit('typing', { to: currentReceiver });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(function() {
                socket.emit('typing_stop', { to: currentReceiver });
            }, 1000);
        });
        
        // Search users
        document.getElementById('searchUsers').addEventListener('input', function(e) {
            var searchTerm = e.target.value.toLowerCase();
            var users = document.querySelectorAll('.user-item');
            users.forEach(function(user) {
                var name = user.querySelector('.name')?.innerText.toLowerCase() || '';
                if (name.includes(searchTerm)) {
                    user.style.display = 'flex';
                } else {
                    user.style.display = 'none';
                }
            });
        });
        
        // Initial load
        loadUsers();
        
        // Refresh users every 10 seconds
        setInterval(loadUsers, 10000);
    </script>
</body>
</html>
