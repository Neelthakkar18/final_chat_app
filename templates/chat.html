<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f0f2f5;}
        .app{display:flex;height:100vh;max-width:1400px;margin:0 auto;background:#fff;}
        
        /* Sidebar */
        .sidebar{width:380px;background:#f8f9fa;border-right:1px solid #e9ecef;display:flex;flex-direction:column;}
        .sidebar-header{background:#075E54;color:white;padding:20px;display:flex;justify-content:space-between;align-items:center;}
        .sidebar-header h2{font-size:18px;}
        .header-icons{display:flex;gap:20px;}
        .header-icons i{font-size:20px;cursor:pointer;}
        
        /* Profile */
        .profile{padding:15px 20px;background:#fff;border-bottom:1px solid #e9ecef;display:flex;align-items:center;gap:15px;cursor:pointer;}
        .avatar{width:50px;height:50px;background:linear-gradient(135deg,#075E54,#128C7E);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:white;position:relative;}
        .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#25D366;border-radius:50%;border:2px solid white;}
        .profile-info{flex:1;}
        .profile-name{font-weight:700;font-size:16px;}
        .profile-status{font-size:12px;color:#6c757d;}
        
        /* Tabs */
        .tabs{display:flex;background:#fff;border-bottom:1px solid #e9ecef;}
        .tab{flex:1;text-align:center;padding:12px;cursor:pointer;color:#6c757d;font-weight:500;transition:all 0.2s;}
        .tab.active{color:#075E54;border-bottom:2px solid #075E54;}
        
        /* Search */
        .search-bar{padding:12px 16px;background:#fff;}
        .search-box{background:#f0f2f5;border-radius:30px;padding:10px 16px;display:flex;align-items:center;gap:10px;}
        .search-box i{color:#6c757d;}
        .search-box input{flex:1;border:none;background:transparent;outline:none;font-size:14px;}
        
        /* Lists */
        .contacts-list{flex:1;overflow-y:auto;}
        .contact,.status-item,.call-item{padding:12px 20px;display:flex;align-items:center;gap:15px;cursor:pointer;border-bottom:1px solid #f0f2f5;transition:background 0.2s;}
        .contact:hover,.status-item:hover,.call-item:hover{background:#f5f6f8;}
        .contact.active{background:#e8f0fe;}
        .contact-info{flex:1;}
        .contact-name{font-weight:600;font-size:15px;margin-bottom:4px;}
        .contact-status{font-size:12px;color:#6c757d;}
        
        /* Status Ring */
        .status-ring{border:2px solid #25D366;padding:2px;}
        
        /* Chat Area */
        .chat-area{flex:1;display:flex;flex-direction:column;background:#efeae2;display:none;}
        .chat-header{background:#075E54;color:white;padding:15px 20px;display:flex;align-items:center;gap:15px;}
        .chat-contact-info{flex:1;}
        .chat-contact-name{font-weight:600;font-size:16px;}
        .chat-contact-status{font-size:12px;opacity:0.8;}
        .chat-actions{display:flex;gap:20px;}
        .chat-actions i{font-size:20px;cursor:pointer;}
        
        /* Messages */
        .messages-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px;}
        .message{display:flex;max-width:65%;animation:fadeIn 0.2s;}
        .message.sent{align-self:flex-end;}
        .message.received{align-self:flex-start;}
        .bubble{padding:10px 14px;border-radius:18px;position:relative;}
        .sent .bubble{background:#dcf8c5;border-bottom-right-radius:4px;}
        .received .bubble{background:white;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,0.1);}
        .msg-text{font-size:14px;}
        .msg-time{font-size:10px;color:#8e9aaf;margin-top:4px;display:flex;align-items:center;justify-content:flex-end;gap:4px;}
        .msg-time i.blue-tick{color:#34b7f1;}
        
        /* Typing */
        .typing-indicator{padding:8px 20px;font-size:12px;color:#6c757d;display:flex;align-items:center;gap:8px;}
        .typing-dots span{width:6px;height:6px;background:#6c757d;border-radius:50%;display:inline-block;animation:typing 1.4s infinite;}
        .typing-dots span:nth-child(2){animation-delay:0.2s;}
        .typing-dots span:nth-child(3){animation-delay:0.4s;}
        @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-4px);opacity:1;}}
        
        /* Input */
        .input-area{padding:15px 20px;background:#f0f2f5;display:flex;gap:12px;}
        .input-area input{flex:1;padding:12px 18px;border:none;border-radius:30px;font-size:14px;outline:none;}
        .input-area button{width:45px;height:45px;border:none;border-radius:50%;cursor:pointer;font-size:18px;}
        .emoji-btn{background:#fff;color:#6c757d;}
        .send-btn{background:#075E54;color:white;}
        
        /* Modal */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;}
        .modal-content{background:white;border-radius:24px;padding:30px;max-width:400px;width:90%;}
        .modal-content h3{color:#075E54;margin-bottom:20px;}
        .modal-content input,.modal-content textarea,.modal-content select{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:12px;}
        
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        ::-webkit-scrollbar{width:6px;}
        ::-webkit-scrollbar-track{background:#f1f1f1;}
        ::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:4px;}
        
        @media(max-width:768px){.sidebar{width:280px;}.message{max-width:85%;}}
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>WhatsApp</h2>
            <div class="header-icons">
                <i class="fas fa-search" onclick="openSearchModal()"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        
        <div class="profile" onclick="openProfileModal()">
            <div class="avatar" id="profileAvatar">{{ username[0]|upper }}<div class="online-dot"></div></div>
            <div class="profile-info">
                <div class="profile-name" id="profileName">{{ username }}</div>
                <div class="profile-status" id="profileStatus">Online</div>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chats')">Chats</div>
            <div class="tab" onclick="switchTab('status')">Status</div>
            <div class="tab" onclick="switchTab('calls')">Calls</div>
        </div>
        
        <div class="search-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search or start new chat" onkeyup="searchUsers()">
            </div>
        </div>
        
        <div class="contacts-list" id="contactsList">
            <div style="text-align:center;padding:40px;color:#999;">Loading...</div>
        </div>
    </div>
    
    <div class="chat-area" id="chatArea">
        <div class="chat-header">
            <div class="avatar" id="chatAvatar">👤</div>
            <div class="chat-contact-info">
                <div class="chat-contact-name" id="chatContactName">Select a chat</div>
                <div class="chat-contact-status" id="chatContactStatus">Click to start messaging</div>
            </div>
            <div class="chat-actions">
                <i class="fas fa-phone" onclick="makeCall('audio')"></i>
                <i class="fas fa-video" onclick="makeCall('video')"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        
        <div class="messages-container" id="messages">
            <div style="text-align:center;padding:50px;color:#999;">
                <i class="fas fa-comments" style="font-size:50px;"></i>
                <p>Select a contact to start chatting</p>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator"></div>
        
        <div class="input-area">
            <button class="emoji-btn" onclick="addEmoji()"><i class="far fa-smile-wink"></i></button>
            <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script>
let username = "{{ username }}";
let currentReceiver = null;
let socket = io();
let typingTimeout = null;
let currentTab = 'chats';

// Socket Events
socket.on('connect', () => { console.log('Connected'); loadContacts(); loadStatuses(); loadCalls(); });
socket.on('receive_message', (data) => {
    if (currentReceiver === data.from) {
        displayMessage(data.from, data.message, data.timestamp, false);
        scrollToBottom();
        socket.emit('mark_read', { from: data.from });
    } else {
        showNotification(data.from);
    }
    loadContacts();
});
socket.on('user_status', (data) => { updateUserStatus(data.username, data.is_online); });
socket.on('user_typing', (data) => { if (currentReceiver === data.from) showTyping(data.from); });
socket.on('user_stop_typing', () => { hideTyping(); });
socket.on('message_history', (messages) => {
    document.getElementById('messages').innerHTML = '';
    messages.forEach(msg => displayMessage(msg.sender, msg.message, msg.timestamp, msg.sender === username, msg.read));
    scrollToBottom();
});
socket.on('messages_read', (data) => { updateReadReceipts(data.from); });
socket.on('incoming_call', (data) => {
    if (confirm(`${data.from} is calling you (${data.call_type})`)) {
        socket.emit('call_answered', { to: data.from, call_id: data.call_id });
    } else {
        socket.emit('call_rejected', { to: data.from });
    }
});

// Tab Switching
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (tab === 'chats') { document.querySelector('.tab:first-child').classList.add('active'); loadContacts(); }
    else if (tab === 'status') { document.querySelector('.tab:nth-child(2)').classList.add('active'); loadStatuses(); }
    else { document.querySelector('.tab:nth-child(3)').classList.add('active'); loadCalls(); }
}

// Load Functions
function loadContacts() {
    fetch('/api/contacts').then(r => r.json()).then(contacts => {
        let html = '';
        contacts.forEach(c => {
            html += `<div class="contact" onclick="selectUser('${c.username}')">
                        <div class="avatar">${c.profile_pic || c.username[0].toUpperCase()}${c.is_online ? '<div class="online-dot"></div>' : ''}</div>
                        <div class="contact-info">
                            <div class="contact-name">${c.full_name || c.username}</div>
                            <div class="contact-status">${c.is_online ? 'Online' : 'Last seen ' + c.last_seen}</div>
                        </div>
                    </div>`;
        });
        document.getElementById('contactsList').innerHTML = html || '<div style="padding:40px;text-align:center;">No chats yet. Search for users!</div>';
    });
}

function loadStatuses() {
    fetch('/api/statuses').then(r => r.json()).then(statuses => {
        let html = `<div class="status-item" onclick="openPostStatusModal()">
                        <div class="avatar status-ring">📷</div>
                        <div class="contact-info"><div class="contact-name">My Status</div><div class="contact-status">Tap to add status update</div></div>
                    </div>`;
        statuses.forEach(s => {
            html += `<div class="status-item" onclick="viewStatus(${s.id})">
                        <div class="avatar status-ring">${s.content_type === 'text' ? '📝' : '📷'}</div>
                        <div class="contact-info"><div class="contact-name">${s.username}</div><div class="contact-status">${s.content.substring(0,30)}</div></div>
                        <div>${s.created_at}</div>
                    </div>`;
        });
        document.getElementById('contactsList').innerHTML = html;
    });
}

function loadCalls() {
    fetch('/api/calls').then(r => r.json()).then(calls => {
        let html = '';
        calls.forEach(c => {
            html += `<div class="call-item">
                        <div class="avatar">${c.call_type === 'audio' ? '📞' : '📹'}</div>
                        <div class="contact-info"><div class="contact-name">${c.with}</div><div class="contact-status">${c.status} call • ${c.timestamp}</div></div>
                        <i class="fas fa-${c.call_type === 'audio' ? 'phone' : 'video'}"></i>
                    </div>`;
        });
        document.getElementById('contactsList').innerHTML = html || '<div style="padding:40px;text-align:center;">No calls yet</div>';
    });
}

function searchUsers() {
    let query = document.getElementById('searchInput').value;
    if (query.length < 1) { loadContacts(); return; }
    fetch('/api/search?q=' + query).then(r => r.json()).then(users => {
        let html = '';
        users.forEach(u => {
            html += `<div class="contact" onclick="selectUser('${u.username}')">
                        <div class="avatar">${u.profile_pic || u.username[0].toUpperCase()}</div>
                        <div class="contact-info"><div class="contact-name">${u.full_name || u.username}</div><div class="contact-status">@${u.username}</div></div>
                    </div>`;
        });
        document.getElementById('contactsList').innerHTML = html;
    });
}

function selectUser(user) {
    currentReceiver = user;
    document.getElementById('chatArea').style.display = 'flex';
    document.getElementById('chatContactName').innerText = user;
    socket.emit('get_history', { with: user });
    document.getElementById('messageInput').focus();
    document.querySelectorAll('.contact').forEach(c => c.classList.remove('active'));
}

function sendMessage() {
    let msg = document.getElementById('messageInput').value.trim();
    if (!msg || !currentReceiver) return;
    let time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    socket.emit('private_message', { to: currentReceiver, message: msg });
    displayMessage(username, msg, time, true);
    document.getElementById('messageInput').value = '';
    scrollToBottom();
    clearTimeout(typingTimeout);
    socket.emit('typing_stop', { to: currentReceiver });
}

function displayMessage(sender, text, time, isSent, isRead) {
    let container = document.getElementById('messages');
    let empty = container.querySelector('div[style*="text-align:center"]');
    if (empty) empty.remove();
    let tick = isSent ? (isRead ? '<i class="fas fa-check-double blue-tick"></i>' : '<i class="fas fa-check-double"></i>') : '';
    let div = document.createElement('div');
    div.className = 'message ' + (isSent ? 'sent' : 'received');
    div.innerHTML = `<div class="bubble">${!isSent ? '<div class="message-name">' + escapeHtml(sender) + '</div>' : ''}<div class="msg-text">${escapeHtml(text)}</div><div class="msg-time">${time} ${tick}</div></div>`;
    container.appendChild(div);
}

function addEmoji() {
    let emojis = ['😀','😂','😍','🔥','👍','🎉','❤️','😎','✨','💯','🥰','🤣','😭','🙌','💪'];
    document.getElementById('messageInput').value += emojis[Math.floor(Math.random() * emojis.length)];
    document.getElementById('messageInput').focus();
}

function scrollToBottom() { let m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }
function showTyping(user) { document.getElementById('typingIndicator').innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div> ${user} is typing...`; }
function hideTyping() { document.getElementById('typingIndicator').innerHTML = ''; }
function showNotification(user) { document.getElementById('contactsList').innerHTML = `<div style="color:#25D366;">New message from ${user}</div>`; }
function updateReadReceipts(from) { document.querySelectorAll('.message.sent').forEach(m => { let t = m.querySelector('.msg-time i'); if(t) t.classList.add('blue-tick'); }); }
function updateUserStatus(user, online) { let contact = document.querySelector(`.contact[data-user="${user}"]`); if(contact) { let status = contact.querySelector('.contact-status'); if(status) status.innerText = online ? 'Online' : 'Offline'; } }
function escapeHtml(t) { let d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function makeCall(type) { if(!currentReceiver) return; fetch('/api/make_call', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({to:currentReceiver, call_type:type}) }); }
function openSearchModal() { document.getElementById('searchModal').style.display = 'flex'; }
function closeSearchModal() { document.getElementById('searchModal').style.display = 'none'; }
function openProfileModal() { document.getElementById('profileModal').style.display = 'flex'; }
function closeProfileModal() { document.getElementById('profileModal').style.display = 'none'; }
function openPostStatusModal() { document.getElementById('statusModal').style.display = 'flex'; }
function closeStatusModal() { document.getElementById('statusModal').style.display = 'none'; }
function postStatus() { let content = document.getElementById('statusContent').value; if(!content) return; fetch('/api/post_status', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({content:content, content_type:'text'}) }).then(()=>{ closeStatusModal(); loadStatuses(); }); }
function updateProfile() { let data = { full_name:document.getElementById('editName').value, bio:document.getElementById('editBio').value }; fetch('/api/update_profile', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }).then(()=>{ closeProfileModal(); location.reload(); }); }
function logout() { window.location.href = '/logout'; }

document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
document.getElementById('messageInput').addEventListener('input', () => { if(!currentReceiver) return; socket.emit('typing_start', { to: currentReceiver }); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { socket.emit('typing_stop', { to: currentReceiver }); }, 1000); });
</script>

<!-- Modals -->
<div id="searchModal" class="modal"><div class="modal-content"><h3>Search Users</h3><input type="text" id="globalSearch" placeholder="Enter username" onkeyup="searchUsers()"><div id="globalResults"></div><button onclick="closeSearchModal()">Close</button></div></div>
<div id="profileModal" class="modal"><div class="modal-content"><h3>Edit Profile</h3><input type="text" id="editName" placeholder="Full Name"><input type="text" id="editBio" placeholder="Bio"><button onclick="updateProfile()">Save</button><button onclick="closeProfileModal()">Cancel</button></div></div>
<div id="statusModal" class="modal"><div class="modal-content"><h3>Add Status</h3><textarea id="statusContent" placeholder="What's on your mind?" rows="3"></textarea><button onclick="postStatus()">Post</button><button onclick="closeStatusModal()">Cancel</button></div></div>
</body>
</html>
