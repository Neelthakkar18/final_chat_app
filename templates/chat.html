<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
</head>

<body data-username="{{ username }}">

<div class="app">

<div class="sidebar">
    <h3>{{ username }}</h3>
    <input id="search" placeholder="Search user">
    <div id="users"></div>
</div>

<div class="chat-area">
<div id="chatName">Select user</div>
<div id="messages"></div>
<div id="typing"></div>

<div class="input">
<input id="msg">
<button onclick="send()">➤</button>
</div>
</div>

</div>

<script>
let socket=io({transports:["websocket"]});
let username=document.body.dataset.username;
let current=null;

// load users
fetch('/api/users').then(r=>r.json()).then(data=>{
    let box=document.getElementById("users");
    data.forEach(u=>{
        let div=document.createElement("div");
        div.innerText=u;
        div.onclick=()=>selectUser(u);
        box.appendChild(div);
    });
});

function selectUser(u){
    current=u;
    document.getElementById("chatName").innerText=u;
}

socket.on("receive_message",(d)=>{
    if(current===d.from||d.from===username){
        addMsg(d.from,d.msg,d.from===username);
    }
});

function send(){
    let m=document.getElementById("msg").value;
    if(!m||!current)return;

    addMsg(username,m,true);
    socket.emit("send_message",{msg:m,to:current});
    document.getElementById("msg").value="";
}

function addMsg(sender,text,sent){
    let div=document.createElement("div");
    div.className=sent?"sent":"received";
    div.innerText=text;
    document.getElementById("messages").appendChild(div);
}

document.getElementById("msg").addEventListener("input",()=>{
    if(current) socket.emit("typing",{to:current});
});

socket.on("typing",(d)=>{
    document.getElementById("typing").innerText=d.from+" typing...";
    setTimeout(()=>document.getElementById("typing").innerText="",1000);
});
</script>

</body>
</html>
