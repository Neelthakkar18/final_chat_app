<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body data-username="{{ username }}">

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="sidebar-header">
            <h2>WhatsApp</h2>
        </div>

        <div class="search-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input id="searchInput" placeholder="Search user">
            </div>
        </div>

        <div id="contactsList" class="contacts-list"></div>

    </div>

    <!-- CHAT -->
    <div class="chat-area" id="chatArea">

        <div class="chat-header">
            <div class="avatar" id="chatAvatar">👤</div>
            <div>
                <div id="chatName">Select user</div>
                <div id="chatStatus">Offline</div>
            </div>
        </div>

        <div id="messages" class="messages-container"></div>

        <div id="typing" class="typing-indicator"></div>

        <div class="input-area">
            <input id="msg" placeholder="Type a message">
            <button onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>

    </div>

</div>

<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>

<script>
let socket = io({ transports:["websocket"], upgrade:false });

let username = document.body.dataset.username;
let currentUser = null;

// connect
socket.on("connect",()=>console.log("connected"));

// receive
socket.on("receive_message",(d)=>{
    if(currentUser===d.from){
        addMsg(d.from,d.msg,false);
    }
});

// typing
socket.on("typing",(d)=>{
    document.getElementById("typing").innerText=d.from+" typing...";
    setTimeout(()=>document.getElementById("typing").innerText="",1000);
});

// select user
function selectUser(u){
    currentUser=u;
    document.getElementById("chatArea").style.display="flex";
    document.getElementById("chatName").innerText=u;
}

// send
function send(){
    let m=document.getElementById("msg").value;
    if(!m||!currentUser)return;

    addMsg(username,m,true);

    socket.emit("send_message",{msg:m,to:currentUser});
    document.getElementById("msg").value="";
}

// add message
function addMsg(sender,text,sent){
    let box=document.getElementById("messages");

    let div=document.createElement("div");
    div.className="message "+(sent?"sent":"received");

    div.innerHTML=`<div class="bubble">${text}</div>`;
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
}

// typing emit
document.getElementById("msg").addEventListener("input",()=>{
    if(currentUser){
        socket.emit("typing",{to:currentUser});
    }
});
</script>

</body>
</html>
