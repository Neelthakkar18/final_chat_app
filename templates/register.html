<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - WhatsApp Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #075E54 0%, #128C7E 50%, #25D366 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: floatBG 25s linear infinite;
            pointer-events: none;
        }

        @keyframes floatBG {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Floating WhatsApp icons */
        .floating-icon {
            position: absolute;
            font-size: 60px;
            color: rgba(255,255,255,0.1);
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Main container */
        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Card styling */
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.4);
        }

        /* Logo section */
        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 70px;
            background: linear-gradient(135deg, #075E54, #25D366);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-section h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #075E54, #128C7E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo-section .subtitle {
            color: #6c757d;
            font-size: 14px;
        }

        /* Input groups */
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 18px;
            transition: all 0.3s;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 16px 18px 16px 52px;
            border: 2px solid #e9ecef;
            border-radius: 60px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            background: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 0 4px rgba(37, 211, 102, 0.1);
        }

        .input-group input:focus + i {
            color: #25D366;
        }

        .input-group input.valid {
            border-color: #28a745;
        }

        .input-group input.invalid {
            border-color: #dc3545;
        }

        /* Validation messages */
        .validation-message {
            font-size: 11px;
            margin-top: 6px;
            margin-left: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .validation-message.valid {
            color: #28a745;
        }

        .validation-message.invalid {
            color: #dc3545;
        }

        /* Password strength */
        .password-strength {
            margin-top: 8px;
            margin-left: 18px;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 5px;
        }

        /* Button */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37, 211, 102, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Alert messages */
        .alert {
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        /* Terms checkbox */
        .terms {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 13px;
            color: #6c757d;
        }

        .terms input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #25D366;
        }

        .terms a {
            color: #25D366;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 28px;
            color: #6c757d;
            font-size: 14px;
        }

        .auth-footer a {
            color: #25D366;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-footer a:hover {
            color: #128C7E;
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #adb5bd;
            font-size: 12px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }

        .divider-text {
            padding: 0 15px;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 520px) {
            .auth-card {
                padding: 40px 28px;
                border-radius: 36px;
            }
            
            .logo-section h1 {
                font-size: 28px;
            }
            
            .logo-icon {
                font-size: 55px;
            }
        }
    </style>
</head>
<body>

<!-- Floating decorative icons -->
<i class="fab fa-whatsapp floating-icon" style="top: 10%; left: 5%; font-size: 50px; animation-delay: 0s;"></i>
<i class="fab fa-whatsapp floating-icon" style="bottom: 15%; right: 8%; font-size: 70px; animation-delay: 2s;"></i>
<i class="fab fa-whatsapp floating-icon" style="top: 20%; right: 15%; font-size: 40px; animation-delay: 4s;"></i>
<i class="fab fa-whatsapp floating-icon" style="bottom: 30%; left: 10%; font-size: 55px; animation-delay: 1s;"></i>

<div class="auth-container">
    <div class="auth-card">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fab fa-whatsapp"></i>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Join WhatsApp and start chatting</p>
        </div>

        <!-- Flash messages container -->
        <div id="flashMessages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endwith %}
        </div>

        <!-- Registration form -->
        <form id="registerForm" method="POST" action="/register">
            <!-- Username field -->
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="username" placeholder="Username" required autofocus>
            </div>
            <div id="usernameValidation" class="validation-message"></div>

            <!-- Full Name field (optional) -->
            <div class="input-group">
                <i class="fas fa-user-circle"></i>
                <input type="text" id="fullName" name="full_name" placeholder="Full Name (optional)">
            </div>

            <!-- Password field -->
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Password" required>
                <i class="fas fa-eye-slash" id="togglePassword" style="left: auto; right: 18px; cursor: pointer;"></i>
            </div>
            <div id="passwordValidation" class="validation-message"></div>
            <div class="password-strength" id="passwordStrength"></div>

            <!-- Confirm Password field -->
            <div class="input-group">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <i class="fas fa-eye-slash" id="toggleConfirmPassword" style="left: auto; right: 18px; cursor: pointer;"></i>
            </div>
            <div id="confirmValidation" class="validation-message"></div>

            <!-- Terms and conditions -->
            <div class="terms">
                <input type="checkbox" id="termsCheckbox">
                <label for="termsCheckbox">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>

            <!-- Submit button -->
            <button type="submit" id="submitBtn" class="btn-primary">
                <i class="fas fa-rocket"></i>
                Sign Up
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">OR</span>
            <div class="divider-line"></div>
        </div>

        <!-- Login link -->
        <div class="auth-footer">
            Already have an account?
            <a href="/login">
                <i class="fas fa-sign-in-alt"></i> Login
            </a>
        </div>
    </div>
</div>

<script>
    // ============================================
    // REGISTER PAGE JAVASCRIPT
    // ============================================

    // DOM Elements
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const fullNameInput = document.getElementById('fullName');
    const termsCheckbox = document.getElementById('termsCheckbox');
    const submitBtn = document.getElementById('submitBtn');
    const registerForm = document.getElementById('registerForm');

    // Validation state
    let isUsernameValid = false;
    let isPasswordValid = false;
    let isConfirmValid = false;
    let isTermsAccepted = false;

    // ============================================
    // PASSWORD VISIBILITY TOGGLE
    // ============================================
    const togglePassword = document.getElementById('togglePassword');
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

    if (togglePassword) {
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    }

    if (toggleConfirmPassword) {
        toggleConfirmPassword.addEventListener('click', function() {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    }

    // ============================================
    // USERNAME VALIDATION
    // ============================================
    function validateUsername() {
        const username = usernameInput.value.trim();
        const validationDiv = document.getElementById('usernameValidation');
        
        if (username.length === 0) {
            validationDiv.innerHTML = '';
            validationDiv.className = 'validation-message';
            isUsernameValid = false;
            return false;
        }
        
        if (username.length < 3) {
            validationDiv.innerHTML = '<i class="fas fa-times-circle"></i> Username must be at least 3 characters';
            validationDiv.className = 'validation-message invalid';
            usernameInput.classList.add('invalid');
            usernameInput.classList.remove('valid');
            isUsernameValid = false;
            return false;
        }
        
        if (username.length > 20) {
            validationDiv.innerHTML = '<i class="fas fa-times-circle"></i> Username must be less than 20 characters';
            validationDiv.className = 'validation-message invalid';
            usernameInput.classList.add('invalid');
            usernameInput.classList.remove('valid');
            isUsernameValid = false;
            return false;
        }
        
        if (!/^[a-zA-Z0-9_]+$/.test(username)) {
            validationDiv.innerHTML = '<i class="fas fa-times-circle"></i> Username can only contain letters, numbers, and underscore';
            validationDiv.className = 'validation-message invalid';
            usernameInput.classList.add('invalid');
            usernameInput.classList.remove('valid');
            isUsernameValid = false;
            return false;
        }
        
        validationDiv.innerHTML = '<i class="fas fa-check-circle"></i> Username is available';
        validationDiv.className = 'validation-message valid';
        usernameInput.classList.add('valid');
        usernameInput.classList.remove('invalid');
        isUsernameValid = true;
        
        // Check availability via AJAX
        checkUsernameAvailability(username);
        
        return true;
    }

    function checkUsernameAvailability(username) {
        if (username.length < 3) return;
        
        fetch(`/api/check_username?username=${encodeURIComponent(username)}`)
            .then(response => response.json())
            .then(data => {
                const validationDiv = document.getElementById('usernameValidation');
                if (data.exists) {
                    validationDiv.innerHTML = '<i class="fas fa-times-circle"></i> Username already taken';
                    validationDiv.className = 'validation-message invalid';
                    usernameInput.classList.add('invalid');
                    usernameInput.classList.remove('valid');
                    isUsernameValid = false;
                } else if (username.length >= 3 && /^[a-zA-Z0-9_]+$/.test(username)) {
                    validationDiv.innerHTML = '<i class="fas fa-check-circle"></i> Username is available';
                    validationDiv.className = 'validation-message valid';
                    usernameInput.classList.add('valid');
                    usernameInput.classList.remove('invalid');
                    isUsernameValid = true;
                }
                updateSubmitButton();
            })
            .catch(error => console.error('Error checking username:', error));
    }

    // ============================================
    // PASSWORD VALIDATION WITH STRENGTH METER
    // ============================================
    function validatePassword() {
        const password = passwordInput.value;
        const validationDiv = document.getElementById('passwordValidation');
        const strengthDiv = document.getElementById('passwordStrength');
        
        if (password.length === 0) {
            validationDiv.innerHTML = '';
            strengthDiv.innerHTML = '';
            isPasswordValid = false;
            return false;
        }
        
        let strength = 0;
        let messages = [];
        
        if (password.length >= 8) {
            strength++;
        } else {
            messages.push('at least 8 characters');
        }
        
        if (/[A-Z]/.test(password)) {
            strength++;
        } else {
            messages.push('one uppercase letter');
        }
        
        if (/[a-z]/.test(password)) {
            strength++;
        } else {
            messages.push('one lowercase letter');
        }
        
        if (/[0-9]/.test(password)) {
            strength++;
        } else {
            messages.push('one number');
        }
        
        if (/[^A-Za-z0-9]/.test(password)) {
            strength++;
        } else {
            messages.push('one special character');
        }
        
        // Update strength meter
        let strengthText = '';
        let strengthColor = '';
        let strengthPercent = (strength / 5) * 100;
        
        if (strength === 0) {
            strengthText = 'Very Weak';
            strengthColor = '#dc3545';
        } else if (strength <= 2) {
            strengthText = 'Weak';
            strengthColor = '#ffc107';
        } else if (strength <= 3) {
            strengthText = 'Medium';
            strengthColor = '#fd7e14';
        } else if (strength <= 4) {
            strengthText = 'Strong';
            strengthColor = '#28a745';
        } else {
            strengthText = 'Very Strong';
            strengthColor = '#20c997';
        }
        
        strengthDiv.innerHTML = `
            <div class="strength-bar" style="width: ${strengthPercent}%; background: ${strengthColor};"></div>
            <div class="strength-text" style="color: ${strengthColor};">${strengthText} password</div>
        `;
        
        if (strength >= 4) {
            validationDiv.innerHTML = '<i class="fas fa-check-circle"></i> Strong password';
            validationDiv.className = 'validation-message valid';
            passwordInput.classList.add('valid');
            passwordInput.classList.remove('invalid');
            isPasswordValid = true;
        } else {
            const message = messages.slice(0, 2).join(', ');
            validationDiv.innerHTML = `<i class="fas fa-times-circle"></i> Add ${message}`;
            validationDiv.className = 'validation-message invalid';
            passwordInput.classList.add('invalid');
            passwordInput.classList.remove('valid');
            isPasswordValid = false;
        }
        
        validateConfirmPassword();
        updateSubmitButton();
        
        return strength >= 4;
    }

    // ============================================
    // CONFIRM PASSWORD VALIDATION
    // ============================================
    function validateConfirmPassword() {
        const password = passwordInput.value;
        const confirm = confirmPasswordInput.value;
        const validationDiv = document.getElementById('confirmValidation');
        
        if (confirm.length === 0) {
            validationDiv.innerHTML = '';
            isConfirmValid = false;
            return false;
        }
        
        if (password === confirm) {
            validationDiv.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
            validationDiv.className = 'validation-message valid';
            confirmPasswordInput.classList.add('valid');
            confirmPasswordInput.classList.remove('invalid');
            isConfirmValid = true;
        } else {
            validationDiv.innerHTML = '<i class="fas fa-times-circle"></i> Passwords do not match';
            validationDiv.className = 'validation-message invalid';
            confirmPasswordInput.classList.add('invalid');
            confirmPasswordInput.classList.remove('valid');
            isConfirmValid = false;
        }
        
        updateSubmitButton();
        return isConfirmValid;
    }

    // ============================================
    // TERMS CHECKBOX
    // ============================================
    function validateTerms() {
        isTermsAccepted = termsCheckbox.checked;
        updateSubmitButton();
        return isTermsAccepted;
    }

    // ============================================
    // UPDATE SUBMIT BUTTON STATE
    // ============================================
    function updateSubmitButton() {
        const allValid = isUsernameValid && isPasswordValid && isConfirmValid && isTermsAccepted;
        submitBtn.disabled = !allValid;
        
        if (allValid) {
            submitBtn.style.opacity = '1';
            submitBtn.style.cursor = 'pointer';
        } else {
            submitBtn.style.opacity = '0.6';
            submitBtn.style.cursor = 'not-allowed';
        }
    }

    // ============================================
    // FORM SUBMIT HANDLER
    // ============================================
    function handleSubmit(e) {
        if (submitBtn.disabled) {
            e.preventDefault();
            return;
        }
        
        // Show loading state
        submitBtn.innerHTML = '<span class="spinner"></span> Creating account...';
        submitBtn.disabled = true;
        
        // Form will submit normally
    }

    // ============================================
    // REAL-TIME VALIDATION EVENT LISTENERS
    // ============================================
    usernameInput.addEventListener('input', validateUsername);
    passwordInput.addEventListener('input', validatePassword);
    confirmPasswordInput.addEventListener('input', validateConfirmPassword);
    termsCheckbox.addEventListener('change', validateTerms);

    // ============================================
    // ANIMATION FOR FLASH MESSAGES
    // ============================================
    function autoHideFlashMessages() {
        const flashMessages = document.querySelectorAll('.alert');
        flashMessages.forEach(msg => {
            setTimeout(() => {
                msg.style.opacity = '0';
                msg.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    if (msg.parentNode) msg.remove();
                }, 300);
            }, 4000);
        });
    }

    // ============================================
    // PASSWORD GENERATOR (Optional feature)
    // ============================================
    function generateStrongPassword() {
        const length = 12;
        const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lowercase = 'abcdefghijklmnopqrstuvwxyz';
        const numbers = '0123456789';
        const special = '!@#$%^&*';
        
        let password = '';
        password += uppercase[Math.floor(Math.random() * uppercase.length)];
        password += lowercase[Math.floor(Math.random() * lowercase.length)];
        password += numbers[Math.floor(Math.random() * numbers.length)];
        password += special[Math.floor(Math.random() * special.length)];
        
        const all = uppercase + lowercase + numbers + special;
        for (let i = password.length; i < length; i++) {
            password += all[Math.floor(Math.random() * all.length)];
        }
        
        // Shuffle
        password = password.split('').sort(() => Math.random() - 0.5).join('');
        passwordInput.value = password;
        validatePassword();
        validateConfirmPassword();
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        autoHideFlashMessages();
        
        // Add password generator button (optional)
        const passwordGroup = document.querySelector('.input-group:has(#password)');
        if (passwordGroup && !document.getElementById('generatePwd')) {
            const genBtn = document.createElement('i');
            genBtn.id = 'generatePwd';
            genBtn.className = 'fas fa-dice';
            genBtn.style.position = 'absolute';
            genBtn.style.right = '50px';
            genBtn.style.top = '50%';
            genBtn.style.transform = 'translateY(-50%)';
            genBtn.style.cursor = 'pointer';
            genBtn.style.color = '#25D366';
            genBtn.title = 'Generate strong password';
            genBtn.onclick = generateStrongPassword;
            passwordGroup.appendChild(genBtn);
        }
    });
</script>

</body>
</html>
